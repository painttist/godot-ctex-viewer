<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.ctex Viewer – FULL Basis Support</title>
  <script src="basis_transcoder.js"></script>
  <style>
    body { margin:0; background:#0a0a0a; color:#ddd; font-family:system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    #drop { flex:1; border:10px dashed #555; margin:30px; border-radius:30px; display:flex; align-items:center; justify-content:center; font-size:3.5rem; color:#777; cursor:pointer; transition:all .3s; text-align:center; background:rgba(255,255,255,0.02); }
    #drop.dragover { border-color:#0f8; color:#0f8; background:rgba(0,255,130,0.12); font-size:3.8rem; }
    #gallery { padding:20px 40px; overflow-y:auto; background:#111; display:flex; flex-wrap:wrap; gap:25px; justify-content:center; }
    .card { background:#1e1e1e; padding:18px; border-radius:20px; max-width:460px; box-shadow:0 10px 30px rgba(0,0,0,0.7); text-align:center; }
    .card img { max-width:100%; border-radius:12px; image-rendering:pixelated; }
    .name { margin-top:14px; font-weight:600; font-size:1.1rem; color:#ccc; word-break:break-all; }
    .status { margin-top:10px; padding:8px; border-radius:8px; font-size:0.95rem; }
  </style>
</head>
<body>

  <div id="drop">
    DROP .CTEX FILE HERE<br>
    <small style="font-size:1.6rem; margin-top:30px; opacity:0.75;">DDS + Basis Universal • Transcoder active</small>
  </div>

  <input type="file" id="fileInput" multiple accept=".ctex" style="display:none">
  <div id="gallery"></div>

<script>
  const drop = document.getElementById('drop');
  const input = document.getElementById('fileInput');
  const gallery = document.getElementById('gallery');

  drop.addEventListener('click', () => input.click());
  input.addEventListener('change', e => processFiles(e.target.files));

  ['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('dragover'); }));
  drop.addEventListener('drop', e => processFiles(e.dataTransfer.files));

  let BasisModule = null;
  BASIS().then(m => {
    BasisModule = m;
    console.log("✅ Basis transcoder ready");
  });

  function findRIFF(bytes) {
    for (let i = 0; i < bytes.length - 4; i++) {
      if (bytes[i]===82 && bytes[i+1]===73 && bytes[i+2]===70 && bytes[i+3]===70) return i;
    }
    return -1;
  }

  async function processFiles(files) {
    for (let file of files) {
      if (!file.name.toLowerCase().endsWith('.ctex')) continue;

      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);

      const card = document.createElement('div');
      card.className = 'card';
      const nameEl = document.createElement('div');
      nameEl.className = 'name';
      nameEl.textContent = file.name;
      card.appendChild(nameEl);

      const riff = findRIFF(bytes);
      if (riff !== -1) {
        // DDS case (old VRAM Compressed)
        const dds = bytes.slice(riff);
        const blob = new Blob([dds], {type: 'image/vnd.ms-dds'});
        const url = URL.createObjectURL(blob);
        const img = document.createElement('img');
        img.src = url;
        card.insertBefore(img, nameEl);
        const s = document.createElement('div'); s.className='status'; s.style.background='#0a3'; s.style.color='#0f8'; s.textContent='✓ DDS (instant)';
        card.appendChild(s);
      } else if (BasisModule) {
        // === BASIS UNIVERSAL DECODING ===
        const status = document.createElement('div');
        status.className = 'status';
        status.style.background = '#f80';
        status.style.color = '#fff';
        status.textContent = 'Decoding Basis Universal…';
        card.appendChild(status);

        try {
          // Try common Godot header skips (GST2, RSRC, etc.)
          let payload = bytes;
          const skips = [0, 16, 32, 64, 128, 256]; // common offsets
          let success = false;

          for (let offset of skips) {
            if (offset >= bytes.length) break;
            const testPayload = bytes.slice(offset);
            const basisFile = new BasisModule.BasisFile(testPayload);
            if (basisFile.getNumImages() > 0) {
              payload = testPayload;
              success = true;
              break;
            }
            basisFile.close();
          }

          if (!success) {
            throw new Error("No valid Basis payload found");
          }

          const basisFile = new BasisModule.BasisFile(payload);
          basisFile.startTranscoding();

          const width = basisFile.getImageWidth(0, 0);
          const height = basisFile.getImageHeight(0, 0);

          const rgba = basisFile.transcodeImageToRGBA32(0, 0); // level 0
          basisFile.close();

          // Render to canvas
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          const imageData = ctx.createImageData(width, height);
          imageData.data.set(rgba);
          ctx.putImageData(imageData, 0, 0);

          canvas.style.maxWidth = '100%';
          canvas.style.borderRadius = '12px';
          card.insertBefore(canvas, nameEl);

          const s = document.createElement('div');
          s.className = 'status';
          s.style.background = '#0a3';
          s.style.color = '#0f8';
          s.textContent = `✓ Basis decoded (${width}×${height})`;
          card.appendChild(s);
        } catch (e) {
          console.error(e);
          status.textContent = 'Basis decode failed – try your Godot test file or tell me the file size';
          status.style.background = '#f00';
        }
      } else {
        const s = document.createElement('div'); s.className='status'; s.style.background='#f00'; s.style.color='#fff'; s.textContent='Transcoder not ready';
        card.appendChild(s);
      }

      gallery.appendChild(card);
    }
  }
</script>
</body>
</html>
