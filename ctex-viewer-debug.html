<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.ctex Viewer – Final</title>
  <style>
    body { margin:0; background:#0a0a0a; color:#ddd; font-family:system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    #drop { flex:1; border:10px dashed #555; margin:30px; border-radius:30px; display:flex; align-items:center; justify-content:center; font-size:3.5rem; color:#777; cursor:pointer; transition:all .3s; text-align:center; background:rgba(255,255,255,0.02); }
    #drop.dragover { border-color:#0f8; color:#0f8; background:rgba(0,255,130,0.12); font-size:3.8rem; }
    #gallery { padding:20px 40px; overflow-y:auto; background:#111; display:flex; flex-wrap:wrap; gap:25px; justify-content:center; }
    .card { background:#1e1e1e; padding:18px; border-radius:20px; max-width:460px; box-shadow:0 10px 30px rgba(0,0,0,0.7); text-align:center; }
    .card img, .card canvas { max-width:100%; border-radius:12px; image-rendering:pixelated; }
    .name { margin-top:14px; font-weight:600; font-size:1.1rem; color:#ccc; word-break:break-all; }
    .status { margin-top:10px; padding:8px; border-radius:8px; font-size:0.95rem; }
  </style>
</head>
<body>

  <div id="drop">
    DROP .CTEX FILE HERE<br>
    <small style="font-size:1.6rem; margin-top:30px; opacity:0.75;">Lossy • Lossless • VRAM Compressed • (Basis needs Godot)</small>
  </div>

  <input type="file" id="fileInput" multiple accept=".ctex" style="display:none">
  <div id="gallery"></div>

<script>
  const drop = document.getElementById('drop');
  const input = document.getElementById('fileInput');
  const gallery = document.getElementById('gallery');

  drop.addEventListener('click', () => input.click());
  input.addEventListener('change', e => processFiles(e.target.files));

  ['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('dragover'); }));
  drop.addEventListener('drop', e => processFiles(e.dataTransfer.files));

  function findMagic(bytes, magic) {
    for (let i = 0; i < bytes.length - magic.length; i++) {
      let match = true;
      for (let j = 0; j < magic.length; j++) if (bytes[i+j] !== magic[j]) { match = false; break; }
      if (match) return i;
    }
    return -1;
  }

  async function processFiles(files) {
    for (let file of files) {
      if (!file.name.toLowerCase().endsWith('.ctex')) continue;

      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);

      const card = document.createElement('div');
      card.className = 'card';
      const nameEl = document.createElement('div');
      nameEl.className = 'name';
      nameEl.textContent = file.name;
      card.appendChild(nameEl);

      // WebP (Lossy / Lossless)
      const riffPos = findMagic(bytes, [82,73,70,70]);
      if (riffPos !== -1 && bytes[riffPos+8] === 87 && bytes[riffPos+9] === 69 && bytes[riffPos+10] === 66 && bytes[riffPos+11] === 80) {
        const blob = new Blob([bytes.slice(riffPos)], {type: 'image/webp'});
        const img = document.createElement('img');
        img.src = URL.createObjectURL(blob);
        card.insertBefore(img, nameEl);
        const s = document.createElement('div'); s.className='status'; s.style.background='#0a3'; s.style.color='#0f8'; s.textContent='✓ Lossy/Lossless (WebP)';
        card.appendChild(s);
        gallery.appendChild(card);
        continue;
      }

      // DDS (VRAM Compressed)
      const ddsPos = findMagic(bytes, [0x44,0x44,0x53,0x20]);
      if (ddsPos !== -1) {
        const blob = new Blob([bytes.slice(ddsPos)], {type: 'image/vnd.ms-dds'});
        const img = document.createElement('img');
        img.src = URL.createObjectURL(blob);
        card.insertBefore(img, nameEl);
        const s = document.createElement('div'); s.className='status'; s.style.background='#0a3'; s.style.color='#0f8'; s.textContent='✓ VRAM Compressed';
        card.appendChild(s);
        gallery.appendChild(card);
        continue;
      }

      // Basis Universal or VRAM Uncompressed
      const s = document.createElement('div'); s.className='status'; s.style.background='#f80'; s.style.color='#fff';
      s.innerHTML = `Basis Universal or VRAM Uncompressed detected<br><br>Use the Godot script below to convert to PNG`;
      card.appendChild(s);
      gallery.appendChild(card);
    }
  }
</script>
</body>
</html>
